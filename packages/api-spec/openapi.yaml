openapi: 3.1.0
info:
  title: Synesis Enterprise API
  version: 1.0.0
  description: API specification for the Synesis AI Talent Intelligence Platform.
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Authentication and User management
  - name: enterprise-tickets
    description: Position tracking and HR ticketing
  - name: enterprise-interviews
    description: Interview scheduling and feedback
  - name: resume
    description: Resume and JD matching operations
  - name: bulk-jobs
    description: Asynchronous bulk analysis operations
  - name: health
    description: System health status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new tenant and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                name: { type: string }
                password: { type: string }
                tenantName: { type: string }
              required: [email, name, password, tenantName]
      responses:
        "201":
          description: Created
        "400":
          description: Missing fields

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate and get a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /enterprise/tickets:
    get:
      operationId: listTickets
      tags: [enterprise-tickets]
      summary: List all position tickets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [enterprise-tickets]
      summary: Create a new position ticket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketBody"
      responses:
        "201":
          description: Created

  /enterprise/interviews:
    get:
      operationId: listInterviews
      tags: [enterprise-interviews]
      summary: List interview slots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterviewSlot"

  /resume/analyze:
    post:
      operationId: analyzeResume
      tags: [resume]
      summary: Analyze resume against job description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeResumeBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /enterprise/bulk-jobs:
    post:
      operationId: createBulkJob
      tags: [bulk-jobs]
      summary: Start a new bulk analysis job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobDescriptionId: { type: integer }
                resumeProfileIds:
                  type: array
                  items: { type: integer }
              required: [jobDescriptionId, resumeProfileIds]
      responses:
        "201":
          description: Job started

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string }
        tenantId: { type: integer }
    Ticket:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        status: { type: string }
        priority: { type: string }
        department: { type: string, nullable: true }
    CreateTicketBody:
      type: object
      properties:
        title: { type: string }
        priority: { type: string, enum: [Low, Medium, High, Critical], default: Medium }
        departmentId: { type: integer, nullable: true }
        openings: { type: integer, default: 1 }
      required: [title]
    InterviewSlot:
      type: object
      properties:
        id: { type: integer }
        scheduledAt: { type: string, format: date-time }
        status: { type: string }
        type: { type: string }
    AnalyzeResumeBody:
      type: object
      properties:
        resumeText: { type: string }
        jobDescription: { type: string }
    AnalysisResult:
      type: object
      properties:
        overallScore: { type: number }
        summary: { type: string }
        strengths: { type: array, items: { type: string } }
        gaps: { type: array, items: { type: string } }
